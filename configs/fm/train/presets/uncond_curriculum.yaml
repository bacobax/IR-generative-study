# Unconditional FM with curriculum learning enabled
#
# Uses the same person-centered crop strategy as text FM,
# but without caption generation (unconditional mode).

data:
  train_dir: "./data/raw/v18/train/"
  val_dir: "./data/raw/v18/val/"
  annotations_path: "data/raw/v18/train/annotations.json"
  batch_size: 8
  num_workers: 4

model:
  unet_config: "configs/models/fm/stable_unet_config.json"
  vae_config: "configs/models/fm/vae_config.json"
  vae_weights: "./artifacts/checkpoints/vae/vae_runs/vae_fm_x4/VAE/vae_best.pt"
  pretrained_unet_path: null

augment:
  warmup_frac: 0.1
  ramp_frac: 0.3
  p_crop_warmup: 0.05
  p_crop_max: 0.20
  p_crop_final: 0.05
  p_rot_warmup: 0.05
  p_rot_max: 0.30
  p_rot_final: 0.05

training:
  epochs: 200
  t_scale: 1000.0
  train_target: "v"
  save_every_n_epochs: 20
  patience: null
  min_delta: 0.0
  strict_load: true

sampling:
  sample_every: 1
  sample_steps: 50
  sample_batch_size: 4

output:
  model_dir: "./artifacts/checkpoints/flow_matching/uncond_fm_curriculum/"
  log_dir: null
  resume: null

# ── Curriculum learning ──────────────────────────────────────────────────
# Same crop mechanism as text FM, but no captions are generated.
curriculum:
  enabled: true
  crop_prob_start: 0.0
  crop_prob_end: 0.3
  schedule: "linear"
  margin_min: 1.2
  margin_max: 2.0
  center_jitter: 0.15
  force_square: false

# Count filtering (generalization testing)
count_filter:
  seen_counts: null
  unseen_counts: null
  max_crop_retries: 5

device: null
