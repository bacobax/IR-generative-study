# FM guided: GMM energy only, MINIMIZE
# Launcher: scripts/generate/fm_guided_gmm_min.sh
mode: fm
fm_pipeline_dir: ./artifacts/checkpoints/flow_matching/serious_runs/stable_training_no_norm_longrun
fm_vae_weights: ./artifacts/checkpoints/flow_matching/serious_runs/stable_training_no_norm_longrun/VAE/vae_best.pt
max_samples: 200
output_dir: ./artifacts/generated/main/fm_guided_gmm_min
fm_steps: 100
fm_batch_size: 4
fm_guidance_method: euler_guided
fm_surprise_ckpt: ./artifacts/runs/main/surprise_predictor/best_model.pt
fm_energy_mode: gmm
fm_sign: minimize
fm_guidance_scale: 2.0
fm_lambda_start: 3.0
fm_lambda_end: 0.5
fm_lambda_schedule: cosine
fm_grad_clip_norm: 1.0
device: cuda:2
