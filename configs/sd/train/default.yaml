# SD 1.5 LoRA training – default configuration (placeholder)
# Reference for typical SD LoRA fine-tuning parameters.
#
# SD training is launched via accelerate and uses its own argparse
# (src.algorithms.stable_diffusion.config.parse_args).
# This file is provided for documentation / future integration.

pretrained_model_name_or_path: "runwayml/stable-diffusion-v1-5"
train_data_dir: null
output_dir: "./sd-model-finetuned-lora"

resolution: 512
interpolation: "lanczos"
train_batch_size: 16
num_train_epochs: 100
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
lr_scheduler: "constant"
lr_warmup_steps: 500
rank: 4
lora_alpha: 1.0

adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 1.0e-2
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

logging_dir: "logs"
report_to: "tensorboard"
checkpointing_steps: 500
seed: 0
